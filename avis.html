<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Laissez-nous votre avis — La Maison de l'Arayes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Permanent+Marker&family=Work+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0D0D0D;
    --bg2: #161616;
    --bg3: #1E1E1E;
    --white: #F2EFE6;
    --cream: #EDEAE2;
    --muted: #8A8A85;
    --accent: #E8572B;
    --accent-h: #F26B3F;
    --fn-head: 'Oswald', sans-serif;
    --fn-body: 'Work Sans', sans-serif;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    background: var(--bg);
    color: var(--cream);
    font-family: var(--fn-body);
    font-weight: 600;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    position: relative;
  }
  h1 { font-family: var(--fn-head); text-transform: uppercase; }

  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0;
    opacity: 0.1; pointer-events: none;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  }
  body::after {
    content: '';
    position: fixed; inset: 0; z-index: 0;
    opacity: 0.04; pointer-events: none;
    background-image: repeating-linear-gradient(115deg, transparent, transparent 3px, rgba(255,255,255,0.7) 3px, rgba(255,255,255,0.7) 4px);
  }

  .card {
    max-width: 480px;
    width: 100%;
    position: relative; z-index: 1;
    background: var(--bg3);
    border: 2px solid var(--white);
    padding: 36px 30px;
  }
  .card h1 { font-size: 26px; margin: 0 0 8px; text-align: center; }
  .card p.subtitle {
    text-align: center;
    color: var(--muted);
    font-size: 14px;
    margin: 0 0 26px;
  }

  .star-rating {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-bottom: 26px;
  }
  .star {
    font-size: 36px;
    color: rgba(242,239,230,0.2);
    cursor: pointer;
    transition: color 0.15s, transform 0.15s;
    user-select: none;
  }
  .star:hover { transform: scale(1.15); }
  .star.filled { color: var(--accent); }

  label {
    display: block;
    font-family: var(--fn-head);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }
  textarea {
    width: 100%;
    background: var(--bg2);
    border: 2px solid rgba(242,239,230,0.25);
    color: var(--cream);
    font-family: var(--fn-body);
    font-weight: 600;
    font-size: 14px;
    padding: 12px 15px;
    min-height: 130px;
    resize: vertical;
    outline: none;
    margin-bottom: 22px;
  }
  textarea:focus { border-color: var(--accent); }

  button.btn-submit {
    width: 100%;
    background: var(--white);
    color: #000;
    border: none;
    font-family: var(--fn-head);
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 16px;
    cursor: pointer;
    transform: skewX(-6deg);
  }
  button.btn-submit:hover:not(:disabled) { background: var(--accent-h); color: var(--white); }
  button.btn-submit:disabled { opacity: 0.6; cursor: default; }

  a.btn-back {
    display: block;
    text-align: center;
    margin-top: 18px;
    font-size: 13px;
    color: var(--muted);
    text-decoration: none;
  }
  a.btn-back:hover { color: var(--accent); }

  #avis-success {
    display: none;
    text-align: center;
  }
  #avis-success .icon { font-size: 56px; margin-bottom: 12px; }
  #avis-success h1 { margin-bottom: 10px; }
  #avis-success p { color: var(--muted); font-size: 15px; }
</style>
</head>
<body>
  <div class="card">
    <div id="avis-form">
      <h1>Votre avis</h1>
      <p class="subtitle">Dites-nous ce que vous en avez pensé.</p>

      <div class="star-rating" id="star-rating">
        <span class="star" data-value="1">★</span>
        <span class="star" data-value="2">★</span>
        <span class="star" data-value="3">★</span>
        <span class="star" data-value="4">★</span>
        <span class="star" data-value="5">★</span>
      </div>

      <label for="avis-message">Votre message</label>
      <textarea id="avis-message" placeholder="Qu'avez-vous pensé de votre Arayes ?"></textarea>

      <button class="btn-submit" id="submit-btn" onclick="submitAvis()">Envoyer mon avis</button>
      <a class="btn-back" href="/">← Retour à l'accueil</a>
    </div>

    <div id="avis-success">
      <div class="icon">✅</div>
      <h1>Merci !</h1>
      <p>Votre avis a bien été envoyé.</p>
      <a class="btn-back" href="/">← Retour à l'accueil</a>
    </div>
  </div>

  <script>
    let currentRating = 0;
    const stars = document.querySelectorAll('.star');

    stars.forEach(star => {
      star.addEventListener('click', () => {
        currentRating = parseInt(star.dataset.value, 10);
        updateStars();
      });
    });

    function updateStars() {
      stars.forEach(star => {
        star.classList.toggle('filled', parseInt(star.dataset.value, 10) <= currentRating);
      });
    }

    async function submitAvis() {
      const message = document.getElementById('avis-message').value.trim();
      if (!message) {
        alert('Merci d\'écrire un message.');
        return;
      }

      const submitBtn = document.getElementById('submit-btn');
      submitBtn.disabled = true;
      submitBtn.textContent = 'Envoi...';

      try {
        const res = await fetch('/api/avis', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message, rating: currentRating })
        });
        if (!res.ok) throw new Error();

        document.getElementById('avis-form').style.display = 'none';
        document.getElementById('avis-success').style.display = 'block';
      } catch (err) {
        alert('Une erreur est survenue, merci de réessayer.');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Envoyer mon avis';
      }
    }
  </script>
</body>
</html>

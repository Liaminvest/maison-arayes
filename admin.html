<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Admin — La Maison de l'Arayes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Permanent+Marker&family=Work+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0D0D0D;
    --bg2: #161616;
    --bg3: #1E1E1E;
    --white: #F2EFE6;
    --cream: #EDEAE2;
    --muted: #8A8A85;
    --accent: #E8572B;
    --accent-h: #F26B3F;
    --fn-head: 'Oswald', sans-serif;
    --fn-body: 'Work Sans', sans-serif;
    --fn-hand: 'Permanent Marker', cursive;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--cream);
    font-family: var(--fn-body);
    font-weight: 600;
    min-height: 100vh;
    position: relative;
  }
  h1, h2, h3 { font-family: var(--fn-head); text-transform: uppercase; }

  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 1;
    opacity: 0.1; pointer-events: none;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  }
  body::after {
    content: '';
    position: fixed; inset: 0; z-index: 1;
    opacity: 0.04; pointer-events: none;
    background-image: repeating-linear-gradient(115deg, transparent, transparent 3px, rgba(255,255,255,0.7) 3px, rgba(255,255,255,0.7) 4px);
  }

  .wrap { max-width: 1100px; margin: 0 auto; padding: 28px 20px 60px; position: relative; z-index: 2; }

  /* Login */
  #login-screen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
    padding: 24px;
    position: relative; z-index: 2;
  }
  #login-screen h1 { font-size: 24px; margin: 0 0 8px; }
  #login-screen input {
    background: var(--bg3);
    border: 2px solid var(--white);
    color: var(--cream);
    padding: 14px 16px;
    font-size: 16px;
    width: 280px;
    font-family: var(--fn-body);
    font-weight: 600;
  }
  #login-screen button, .btn {
    background: var(--white);
    color: #000;
    border: none;
    padding: 14px 22px;
    font-family: var(--fn-head);
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    cursor: pointer;
    transform: skewX(-6deg);
    transition: background 0.2s, color 0.2s;
  }
  #login-screen button:hover, .btn:hover { background: var(--accent-h); color: var(--white); }
  #login-error { color: var(--accent); font-size: 14px; min-height: 18px; font-weight: 700; }

  /* Dashboard */
  #dashboard { display: none; }
  header.top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 12px;
    margin-bottom: 24px;
  }
  header.top h1 { font-size: 26px; margin: 0; }
  .btn-gold { background: var(--accent); color: var(--white); }
  .btn-gold:hover { background: var(--accent-h); }

  .recap {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 14px;
    margin-bottom: 28px;
  }
  .recap-card {
    background: var(--bg3);
    border: 2px solid var(--white);
    padding: 16px 18px;
  }
  .recap-card .lbl { font-family: var(--fn-head); font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; }
  .recap-card .val { font-size: 26px; font-weight: 700; margin-top: 6px; font-family: var(--fn-head); }

  .orders-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 16px;
  }
  .order-card {
    background: var(--bg3);
    border: 2px solid var(--white);
    padding: 18px;
    position: relative;
  }
  .order-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 10px;
  }
  .order-time { font-size: 13px; color: var(--muted); }
  .order-name { font-size: 18px; font-weight: 800; margin: 2px 0; }
  .order-phone { font-size: 14px; color: var(--cream); }
  .order-detail { font-size: 14px; color: var(--cream); margin: 10px 0 6px; line-height: 1.5; }
  .order-remarques {
    font-size: 13px;
    color: #000;
    background: var(--accent);
    padding: 8px 10px;
    margin: 6px 0;
    font-weight: 700;
  }
  .order-scheduled {
    font-family: var(--fn-head);
    font-size: 17px;
    font-weight: 700;
    color: var(--accent);
    background: var(--bg2);
    border: 2px solid var(--accent);
    padding: 10px 12px;
    margin: 8px 0 4px;
  }
  .order-countdown { font-size: 13px; color: var(--muted); margin: 0 0 8px; }
  .order-total { font-size: 19px; font-weight: 700; color: var(--accent); margin: 6px 0; font-family: var(--fn-head); }
  .badge {
    display: inline-block;
    font-family: var(--fn-head);
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .04em;
    padding: 5px 12px;
    border: 2px solid var(--white);
    color: var(--white);
    transform: rotate(-3deg);
  }
  .badge.nouvelle { background: #C0392B; }
  .badge.en_preparation { background: var(--accent); }
  .badge.pret { background: #5B3FA0; }
  .badge.en_livraison { background: #2E78D2; }
  .badge.livre { background: #2E9E5B; }

  .status-row {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 12px;
  }
  .status-btn {
    background: var(--bg2);
    border: 2px solid rgba(242,239,230,0.25);
    color: var(--cream);
    font-family: var(--fn-head);
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    padding: 7px 10px;
    cursor: pointer;
  }
  .status-btn.active {
    border-color: var(--accent);
    color: var(--accent);
  }
  .status-btn.pret-btn {
    background: var(--accent);
    color: var(--white);
    border-color: var(--accent);
    font-weight: 700;
  }
  .empty { color: var(--muted); padding: 40px; text-align: center; }

  .sound-banner {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 1000;
    background: var(--accent);
    color: var(--white);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-wrap: wrap;
    gap: 12px;
    padding: 12px 16px;
    font-weight: 700;
    font-size: 14px;
  }
  .sound-banner button {
    background: var(--white);
    color: #000;
    border: none;
    padding: 8px 16px;
    font-family: var(--fn-head);
    font-weight: 700;
    font-size: 13px;
    text-transform: uppercase;
    cursor: pointer;
    transform: skewX(-6deg);
  }

  @keyframes flash-border {
    0%, 100% { border-color: var(--white); box-shadow: none; }
    50% { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(232,87,43,0.4); }
  }
  .order-card.new-flash { animation: flash-border 0.5s ease-in-out 4; }
</style>
</head>
<body>

<div id="sound-banner" class="sound-banner">
  <span>🔔 Active les sons pour être alerté des nouvelles commandes</span>
  <button onclick="enableSound()">🔔 Activer les sons</button>
</div>

<div id="login-screen">
  <h1>🔒 Espace administration</h1>
  <input type="password" id="login-input" placeholder="Mot de passe" />
  <button onclick="login()">Se connecter</button>
  <div id="login-error"></div>
</div>

<div id="dashboard">
  <div class="wrap">
    <header class="top">
      <h1>Commandes</h1>
      <div style="display:flex; gap:10px; flex-wrap:wrap;">
        <button class="btn" id="toggle-delivered-btn" onclick="toggleDelivered()">📦 Anciennes commandes</button>
        <button class="btn btn-gold" onclick="exportCsv()">Exporter en CSV</button>
      </div>
    </header>

    <div class="recap" id="recap"></div>

    <div class="orders-grid" id="orders-grid"></div>
  </div>
</div>

<script>
  const STATUTS = ['nouvelle', 'en_preparation', 'en_livraison', 'livre'];
  const STATUT_LABELS = {
    nouvelle: 'Nouvelle',
    en_preparation: 'En préparation',
    pret: 'Prêt',
    en_livraison: 'En livraison',
    livre: 'Livré'
  };

  const OPENING_HOURS = {
    0: [12, 30, 22, 0],
    1: [19, 0, 22, 0],
    2: [19, 0, 22, 0],
    3: [19, 0, 22, 0],
    4: [19, 0, 22, 0],
    5: null,
    6: null
  };

  function getDayWindow(date) {
    const hours = OPENING_HOURS[date.getDay()];
    if (!hours) return null;
    const [oh, om, ch, cm] = hours;
    const open = new Date(date); open.setHours(oh, om, 0, 0);
    const close = new Date(date); close.setHours(ch, cm, 0, 0);
    return { open, close };
  }

  function isOpenAt(date) {
    const win = getDayWindow(date);
    return !!win && date >= win.open && date <= win.close;
  }

  function getNextOpening(from) {
    for (let i = 0; i < 8; i++) {
      const d = new Date(from);
      d.setDate(d.getDate() + i);
      const win = getDayWindow(d);
      if (win && win.open > from) return win.open;
    }
    return null;
  }

  let password = localStorage.getItem('adminPassword') || '';
  let refreshTimer = null;
  let lastOrders = [];
  let showDelivered = false;

  let audioCtx = null;
  let soundEnabled = false;
  let seenOrderIds = new Set();
  let firstLoad = true;

  function playBeep(frequencies, duration = 350, gap = 150) {
    if (!soundEnabled) return;
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    let startTime = audioCtx.currentTime;
    const durSec = duration / 1000;
    const fade = Math.min(0.015, durSec / 4);

    frequencies.forEach(freq => {
      const osc = audioCtx.createOscillator();
      const gainNode = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.value = freq;
      osc.connect(gainNode);
      gainNode.connect(audioCtx.destination);

      gainNode.gain.setValueAtTime(0, startTime);
      gainNode.gain.linearRampToValueAtTime(0.3, startTime + fade);
      gainNode.gain.linearRampToValueAtTime(0.3, startTime + durSec - fade);
      gainNode.gain.linearRampToValueAtTime(0, startTime + durSec);

      osc.start(startTime);
      osc.stop(startTime + durSec);

      startTime += durSec + gap / 1000;
    });
  }

  function speak(text) {
    if (!soundEnabled) return;
    if (!('speechSynthesis' in window)) return;
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = 'fr-FR';
    speechSynthesis.speak(utterance);
  }

  function enableSound() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    audioCtx.resume();
    soundEnabled = true;
    playBeep([880]);
    document.getElementById('sound-banner').style.display = 'none';
  }

  async function login() {
    const input = document.getElementById('login-input');
    const pwd = input.value;
    const ok = await tryFetchOrders(pwd);
    if (ok) {
      password = pwd;
      localStorage.setItem('adminPassword', pwd);
      showDashboard();
    } else {
      document.getElementById('login-error').textContent = 'Mot de passe incorrect.';
    }
  }

  async function tryFetchOrders(pwd) {
    try {
      const res = await fetch('/api/orders', { headers: { 'x-admin-password': pwd } });
      if (!res.ok) return false;
      const data = await res.json();
      renderOrders(data);
      return true;
    } catch (err) {
      return false;
    }
  }

  function showDashboard() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    if (refreshTimer) clearInterval(refreshTimer);
    refreshTimer = setInterval(() => tryFetchOrders(password), 10000);
  }

  function renderOrders(orders) {
    lastOrders = orders;

    const newOrderIds = [];
    if (!firstLoad) {
      orders.forEach(o => {
        if (!seenOrderIds.has(o.id) && o.statut === 'nouvelle') {
          newOrderIds.push(o.id);
        }
      });
    }
    orders.forEach(o => seenOrderIds.add(o.id));
    firstLoad = false;

    renderGrid();

    const grid = document.getElementById('orders-grid');
    if (newOrderIds.length > 0) {
      playBeep([880, 880]);
      setTimeout(() => speak('Nouvelle commande'), 900);
      newOrderIds.forEach(id => {
        const el = grid.querySelector(`[data-order-id="${id}"]`);
        if (el) {
          el.classList.add('new-flash');
          setTimeout(() => el.classList.remove('new-flash'), 2000);
        }
      });
    }
  }

  function toggleDelivered() {
    showDelivered = !showDelivered;
    document.getElementById('toggle-delivered-btn').textContent = showDelivered
      ? '📦 Masquer les anciennes commandes'
      : '📦 Anciennes commandes';
    renderGrid();
  }

  function renderGrid() {
    const grid = document.getElementById('orders-grid');
    const visibleOrders = showDelivered ? lastOrders : lastOrders.filter(o => o.statut !== 'livre');

    const totalCommandes = visibleOrders.length;
    const totalCA = visibleOrders.reduce((sum, o) => sum + parseFloat(o.total || 0), 0);
    const totalClassique = visibleOrders.reduce((sum, o) => sum + (o.classique || 0), 0);
    const totalThina = visibleOrders.reduce((sum, o) => sum + (o.thina || 0), 0);

    document.getElementById('recap').innerHTML = `
      <div class="recap-card"><div class="lbl">Commandes</div><div class="val">${totalCommandes}</div></div>
      <div class="recap-card"><div class="lbl">Chiffre d'affaires</div><div class="val">${totalCA.toFixed(2)} CHF</div></div>
      <div class="recap-card"><div class="lbl">Arayes Classique</div><div class="val">${totalClassique}</div></div>
      <div class="recap-card"><div class="lbl">Pots de Thina</div><div class="val">${totalThina}</div></div>
    `;

    if (visibleOrders.length === 0) {
      grid.innerHTML = `<div class="empty">${showDelivered ? 'Aucune commande livrée pour le moment.' : 'Aucune commande en cours.'}</div>`;
      return;
    }

    grid.innerHTML = visibleOrders.map(o => {
      const time = new Date(o.created_at).toLocaleString('fr-CH', { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' });
      const adresseLine = o.mode === 'livraison' && o.adresse ? `<div class="order-detail">📍 ${escapeHtml(o.adresse)}</div>` : '';
      const remarquesLine = o.remarques ? `<div class="order-remarques">📝 ${escapeHtml(o.remarques)}</div>` : '';
      const statusBtns = STATUTS.map(s =>
        `<button class="status-btn ${s === o.statut ? 'active' : ''}" onclick="setStatus(${o.id}, '${s}')">${STATUT_LABELS[s]}</button>`
      ).join('');
      const pretBtn = (o.mode === 'livraison' && (o.statut === 'nouvelle' || o.statut === 'en_preparation'))
        ? `<button class="status-btn pret-btn" onclick="marquerPret(${o.id})">✅ Marquer comme prêt</button>`
        : '';

      let scheduledBlock = '';
      if (o.scheduled_for) {
        const schedDate = new Date(o.scheduled_for);
        const schedText = schedDate.toLocaleString('fr-CH', { weekday: 'long', day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' });
        const now = new Date();
        let countdownText;
        if (isOpenAt(now)) {
          countdownText = '🟢 Actuellement ouvert';
        } else {
          const nextOpening = getNextOpening(now);
          if (nextOpening) {
            const diffMs = nextOpening - now;
            const h = Math.floor(diffMs / 3600000);
            const m = Math.round((diffMs % 3600000) / 60000);
            countdownText = `🕐 Ouverture dans ${h > 0 ? h + 'h ' : ''}${m}min`;
          } else {
            countdownText = '';
          }
        }
        scheduledBlock = `
          <div class="order-scheduled">⏰ Prêt pour : ${schedText}</div>
          <div class="order-countdown">${countdownText}</div>
        `;
      }

      return `
        <div class="order-card" data-order-id="${o.id}">
          <div class="order-top">
            <div>
              <div class="order-time">${time}${o.numero_commande ? ' · ' + escapeHtml(o.numero_commande) : ''}</div>
              <div class="order-name">${escapeHtml(o.nom || '—')}</div>
              <div class="order-phone">${escapeHtml(o.telephone || '—')}</div>
            </div>
            <span class="badge ${o.statut}">${STATUT_LABELS[o.statut] || o.statut}</span>
          </div>
          ${scheduledBlock}
          <div class="order-detail">${o.classique || 0}× Classique · ${o.thina || 0}× Thina · ${o.mode === 'livraison' ? 'Livraison' : 'Retrait'}</div>
          ${adresseLine}
          ${remarquesLine}
          <div class="order-total">${parseFloat(o.total || 0).toFixed(2)} CHF</div>
          <div class="status-row">${pretBtn}${statusBtns}</div>
        </div>
      `;
    }).join('');
  }

  async function setStatus(id, statut) {
    try {
      await fetch(`/api/orders/${id}/status`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-admin-password': password },
        body: JSON.stringify({ statut })
      });
      tryFetchOrders(password);
    } catch (err) {
      alert('Erreur lors du changement de statut.');
    }
  }

  async function marquerPret(id) {
    try {
      await fetch(`/api/orders/${id}/pret`, {
        method: 'POST',
        headers: { 'x-admin-password': password }
      });
      tryFetchOrders(password);
    } catch (err) {
      alert('Erreur lors du marquage comme prêt.');
    }
  }

  async function exportCsv() {
    try {
      const res = await fetch('/api/orders/export', { headers: { 'x-admin-password': password } });
      if (!res.ok) throw new Error('export failed');
      const blob = await res.blob();
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'commandes.csv';
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    } catch (err) {
      alert("Erreur lors de l'export CSV.");
    }
  }

  function escapeHtml(str) {
    return String(str).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
  }

  document.getElementById('login-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') login();
  });

  if (password) {
    tryFetchOrders(password).then(ok => {
      if (ok) showDashboard();
    });
  }
</script>
</body>
</html>

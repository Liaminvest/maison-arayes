<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Paiement annulé — La Maison de l'Arayes</title>
<style>
  body {
    margin: 0;
    min-height: 100vh;
    background: #0C1520;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 24px;
    box-sizing: border-box;
  }
  .card {
    max-width: 480px;
  }
  .icon {
    font-size: 64px;
    margin-bottom: 16px;
  }
  h1 {
    font-size: 28px;
    margin: 0 0 16px;
  }
  p {
    font-size: 16px;
    line-height: 1.6;
    color: #c7d0db;
    margin: 0 0 28px;
  }
  .btn-row {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
  }
  a.btn {
    display: inline-block;
    text-decoration: none;
    font-weight: 600;
    padding: 14px 28px;
    border-radius: 8px;
  }
  a.btn-primary {
    background: #fff;
    color: #0C1520;
  }
  a.btn-secondary {
    background: transparent;
    color: #fff;
    border: 1px solid #ffffff55;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="icon">↩️</div>
    <h1>Paiement annulé</h1>
    <p>
      Votre paiement a été annulé. Aucun montant n'a été débité.
    </p>
    <div class="btn-row">
      <a class="btn btn-primary" href="/#commander">Réessayer</a>
      <a class="btn btn-secondary" href="https://wa.me/41775383177">WhatsApp</a>
    </div>
  </div>
</body>
</html>

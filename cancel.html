<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Paiement annulé — La Maison de l'Arayes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Permanent+Marker&family=Work+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0D0D0D;
    --bg3: #1E1E1E;
    --white: #F2EFE6;
    --cream: #EDEAE2;
    --muted: #8A8A85;
    --accent: #E8572B;
    --accent-h: #F26B3F;
    --fn-head: 'Oswald', sans-serif;
    --fn-body: 'Work Sans', sans-serif;
  }
  body {
    margin: 0;
    min-height: 100vh;
    background: var(--bg);
    color: var(--cream);
    font-family: var(--fn-body);
    font-weight: 600;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 24px;
    box-sizing: border-box;
    position: relative;
  }
  h1 { font-family: var(--fn-head); text-transform: uppercase; }

  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0;
    opacity: 0.1; pointer-events: none;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  }
  body::after {
    content: '';
    position: fixed; inset: 0; z-index: 0;
    opacity: 0.04; pointer-events: none;
    background-image: repeating-linear-gradient(115deg, transparent, transparent 3px, rgba(255,255,255,0.7) 3px, rgba(255,255,255,0.7) 4px);
  }
  .card {
    max-width: 480px;
    position: relative; z-index: 1;
  }
  .icon {
    font-size: 64px;
    margin-bottom: 16px;
  }
  h1 {
    font-size: 30px;
    margin: 0 0 16px;
  }
  p {
    font-size: 16px;
    line-height: 1.6;
    color: var(--muted);
    margin: 0 0 28px;
  }
  .btn-row {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
  }
  a.btn {
    display: inline-block;
    text-decoration: none;
    font-family: var(--fn-head);
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    padding: 14px 28px;
    transform: skewX(-6deg);
  }
  a.btn-primary {
    background: var(--white);
    color: #000;
  }
  a.btn-primary:hover { background: var(--accent-h); color: var(--white); }
  a.btn-secondary {
    background: transparent;
    color: var(--cream);
    border: 2px solid rgba(242,239,230,0.4);
  }
  a.btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
</style>
</head>
<body>
  <div class="card">
    <div class="icon">↩️</div>
    <h1>Paiement annulé</h1>
    <p>
      Votre paiement a été annulé. Aucun montant n'a été débité.
    </p>
    <div class="btn-row">
      <a class="btn btn-primary" href="/#commander">Réessayer</a>
      <a class="btn btn-secondary" href="https://wa.me/41775383177">WhatsApp</a>
    </div>
  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Livreur — La Maison de l'Arayes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0C1520;
    --red: #9B3222;
    --gold: #C4923A;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: #fff;
    font-family: 'Outfit', -apple-system, sans-serif;
    min-height: 100vh;
  }
  .wrap { max-width: 560px; margin: 0 auto; padding: 20px 16px 60px; }

  #login-screen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
    padding: 24px;
    text-align: center;
  }
  #login-screen h1 { font-size: 24px; margin: 0 0 8px; }
  #login-screen input {
    background: #15212f;
    border: 1px solid #ffffff22;
    color: #fff;
    padding: 16px;
    border-radius: 10px;
    font-size: 18px;
    width: 100%;
    max-width: 300px;
    font-family: inherit;
  }
  #login-screen button {
    background: var(--red);
    color: #fff;
    border: none;
    padding: 16px 24px;
    border-radius: 10px;
    font-size: 17px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    width: 100%;
    max-width: 300px;
  }
  #login-error { color: #ff6b6b; font-size: 15px; min-height: 20px; }

  #dashboard { display: none; }
  h1.title { font-size: 22px; margin: 4px 0 16px; }
  .gps-status { font-size: 13px; color: #8fa0b3; margin: -8px 0 14px; }
  .gps-status.active { color: #2E9E5B; }
  .gps-status.error { color: #C0392B; }

  .wait-banner {
    background: #F2B134;
    color: #1a1208;
    font-weight: 700;
    font-size: 17px;
    padding: 14px 18px;
    border-radius: 10px;
    margin-bottom: 18px;
    text-align: center;
    display: none;
  }

  .stop-number {
    display: inline-block;
    background: var(--red);
    color: #fff;
    font-weight: 800;
    font-size: 13px;
    padding: 4px 10px;
    border-radius: 999px;
    margin-bottom: 10px;
  }
  .order-trajet { font-size: 15px; color: #8fa0b3; margin: 6px 0 14px; }

  .order-card {
    background: #121f2e;
    border: 1px solid #ffffff14;
    border-radius: 14px;
    padding: 20px;
    margin-bottom: 18px;
  }
  .order-name { font-size: 22px; font-weight: 800; margin-bottom: 4px; }
  .order-phone a {
    color: var(--gold);
    font-size: 19px;
    font-weight: 600;
    text-decoration: none;
  }
  .order-adresse {
    font-size: 20px;
    font-weight: 700;
    margin: 14px 0;
    line-height: 1.4;
    background: #0c1822;
    border-radius: 10px;
    padding: 14px;
  }
  .order-detail { font-size: 17px; color: #c7d0db; margin: 10px 0; }
  .order-total { font-size: 19px; font-weight: 700; color: var(--gold); margin-bottom: 14px; }

  .livre-check-row {
    display: flex;
    align-items: center;
    gap: 14px;
    background: #0c1822;
    border: 2px solid #2E9E5B;
    border-radius: 10px;
    padding: 16px 18px;
    cursor: pointer;
  }
  .livre-check-row input[type="checkbox"] {
    width: 28px;
    height: 28px;
    min-width: 28px;
    accent-color: #2E9E5B;
    cursor: pointer;
  }
  .livre-check-row span {
    font-size: 17px;
    font-weight: 700;
    color: #2E9E5B;
  }
  .order-remarques {
    font-size: 14px;
    color: #1a1208;
    background: var(--gold);
    border-radius: 8px;
    padding: 10px 12px;
    margin: 6px 0 14px;
    font-weight: 600;
  }
  .localisation-warning {
    background: #C0392B;
    color: #fff;
    font-weight: 700;
    font-size: 14px;
    padding: 10px 12px;
    border-radius: 8px;
    margin: 6px 0 14px;
  }

  .top-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 4px;
  }
  .btn-logout {
    background: transparent;
    border: 1px solid #ffffff33;
    color: #c7d0db;
    font-size: 13px;
    font-weight: 600;
    padding: 8px 14px;
    border-radius: 8px;
    cursor: pointer;
    font-family: inherit;
  }

  @keyframes pulse-gold {
    0%, 100% { box-shadow: 0 0 0 0 rgba(196, 146, 58, 0.5); }
    50% { box-shadow: 0 0 0 8px rgba(196, 146, 58, 0); }
  }
  .proposal-card {
    background: #1a2838;
    border: 2px solid var(--gold);
    border-radius: 14px;
    padding: 20px;
    margin-bottom: 20px;
    animation: pulse-gold 1.5s infinite;
  }
  .proposal-badge {
    display: inline-block;
    background: var(--gold);
    color: #1a1208;
    font-weight: 800;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: .03em;
    padding: 5px 12px;
    border-radius: 999px;
    margin-bottom: 12px;
  }
  .proposal-actions {
    display: flex;
    gap: 10px;
    margin-top: 14px;
  }
  .btn-accept, .btn-decline {
    flex: 1;
    border: none;
    padding: 16px;
    border-radius: 10px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
  }
  .btn-accept { background: #2E9E5B; color: #fff; }
  .btn-decline { background: transparent; border: 1px solid #C0392B; color: #C0392B; }

  .empty { color: #8fa0b3; padding: 60px 20px; text-align: center; font-size: 18px; }

  .sound-banner {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 1000;
    background: var(--gold);
    color: #1a1208;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-wrap: wrap;
    gap: 12px;
    padding: 12px 16px;
    font-weight: 600;
    font-size: 14px;
    text-align: center;
  }
  .sound-banner button {
    background: #1a1208;
    color: #fff;
    border: none;
    padding: 8px 16px;
    border-radius: 6px;
    font-weight: 700;
    font-size: 13px;
    cursor: pointer;
    font-family: inherit;
  }

  @keyframes flash-border {
    0%, 100% { border-color: #ffffff14; box-shadow: none; }
    50% { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(196, 146, 58, 0.4); }
  }
  .order-card.new-flash { animation: flash-border 0.5s ease-in-out 4; }
</style>
</head>
<body>

<div id="sound-banner" class="sound-banner">
  <span>🔔 Active les sons pour être alerté des commandes prêtes</span>
  <button onclick="enableSound()">🔔 Activer les sons</button>
</div>

<div id="login-screen">
  <h1>🛵 Espace livreur</h1>
  <input type="password" id="login-input" placeholder="Mot de passe" />
  <button onclick="login()">Se connecter</button>
  <div id="login-error"></div>
</div>

<div id="dashboard">
  <div class="wrap">
    <div class="top-row">
      <h1 class="title">Tournée</h1>
      <button class="btn-logout" onclick="logout()">Déconnecter</button>
    </div>
    <div id="gps-status" class="gps-status">📍 Géolocalisation...</div>
    <div id="proposal-zone"></div>
    <div id="wait-banner" class="wait-banner"></div>
    <div id="orders-list"></div>
  </div>
</div>

<script>
  let password = localStorage.getItem('livreurPassword') || '';
  let refreshTimer = null;

  let audioCtx = null;
  let soundEnabled = false;
  let seenStopIds = new Set();
  let firstLoad = true;
  let seenProposalId = null;
  let geoWatchId = null;

  function playBeep(frequencies, duration = 350, gap = 150) {
    if (!soundEnabled) return;
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    let startTime = audioCtx.currentTime;
    const durSec = duration / 1000;
    const fade = Math.min(0.015, durSec / 4);

    frequencies.forEach(freq => {
      const osc = audioCtx.createOscillator();
      const gainNode = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.value = freq;
      osc.connect(gainNode);
      gainNode.connect(audioCtx.destination);

      gainNode.gain.setValueAtTime(0, startTime);
      gainNode.gain.linearRampToValueAtTime(0.3, startTime + fade);
      gainNode.gain.linearRampToValueAtTime(0.3, startTime + durSec - fade);
      gainNode.gain.linearRampToValueAtTime(0, startTime + durSec);

      osc.start(startTime);
      osc.stop(startTime + durSec);

      startTime += durSec + gap / 1000;
    });
  }

  function enableSound() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    audioCtx.resume();
    soundEnabled = true;
    playBeep([880]);
    document.getElementById('sound-banner').style.display = 'none';
  }

  function speak(text) {
    if (!soundEnabled) return;
    if (!('speechSynthesis' in window)) return;
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = 'fr-FR';
    speechSynthesis.speak(utterance);
  }

  async function login() {
    const input = document.getElementById('login-input');
    const pwd = input.value;
    const ok = await tryFetchOrders(pwd);
    if (ok) {
      password = pwd;
      localStorage.setItem('livreurPassword', pwd);
      showDashboard();
    } else {
      document.getElementById('login-error').textContent = 'Mot de passe incorrect.';
    }
  }

  async function tryFetchOrders(pwd) {
    try {
      const res = await fetch('/api/orders/route', { headers: { 'x-livreur-password': pwd } });
      if (!res.ok) return false;
      const data = await res.json();
      renderRoute(data);
      return true;
    } catch (err) {
      return false;
    }
  }

  function showDashboard() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    if (refreshTimer) clearInterval(refreshTimer);
    refreshTimer = setInterval(() => tryFetchOrders(password), 15000);
    startPositionTracking();
  }

  let lastPositionSend = 0;

  function startPositionTracking() {
    const gpsStatus = document.getElementById('gps-status');
    if (!('geolocation' in navigator)) {
      gpsStatus.textContent = '📍 Géolocalisation non disponible sur cet appareil';
      gpsStatus.className = 'gps-status error';
      return;
    }
    geoWatchId = navigator.geolocation.watchPosition(
      pos => {
        gpsStatus.textContent = '📍 Position partagée — calculs basés sur votre position réelle';
        gpsStatus.className = 'gps-status active';
        const now = Date.now();
        if (now - lastPositionSend < 10000) return;
        lastPositionSend = now;
        sendPosition(pos.coords.latitude, pos.coords.longitude);
      },
      err => {
        gpsStatus.textContent = '📍 Position non partagée — estimations basées sur la cuisine';
        gpsStatus.className = 'gps-status error';
      },
      { enableHighAccuracy: true, maximumAge: 15000, timeout: 10000 }
    );
  }

  async function sendPosition(lat, lng) {
    try {
      await fetch('/api/livreur/position', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-livreur-password': password },
        body: JSON.stringify({ lat, lng })
      });
    } catch (err) {
      // on réessaiera à la prochaine mise à jour de position
    }
  }

  function renderRoute(data) {
    const { stops, wait_suggestion, proposal, message } = data;
    const banner = document.getElementById('wait-banner');
    const container = document.getElementById('orders-list');
    const proposalZone = document.getElementById('proposal-zone');

    if (proposal) {
      if (seenProposalId !== proposal.id) {
        seenProposalId = proposal.id;
        playBeep([660, 880, 1100, 1300]);
        setTimeout(() => speak('Nouvelle commande'), 1200);
      }
      const declineBtn = proposal.can_decline
        ? `<button class="btn-decline" onclick="declineProposal(${proposal.id})">❌ Décliner</button>`
        : '';
      proposalZone.innerHTML = `
        <div class="proposal-card">
          <div class="proposal-badge">🆕 Nouvelle commande disponible</div>
          <div class="order-name">${escapeHtml(proposal.nom || '—')}${proposal.numero_commande ? ' · ' + escapeHtml(proposal.numero_commande) : ''}</div>
          <div class="order-adresse">📍 ${escapeHtml(proposal.adresse || 'Adresse non renseignée')}</div>
          <div class="order-detail">${proposal.classique || 0}× Classique · ${proposal.thina || 0}× Thina</div>
          ${proposal.remarques ? `<div class="order-remarques">📝 ${escapeHtml(proposal.remarques)}</div>` : ''}
          <div class="order-total">${parseFloat(proposal.total || 0).toFixed(2)} CHF</div>
          <div class="proposal-actions">
            <button class="btn-accept" onclick="acceptProposal(${proposal.id})">✅ Accepter</button>
            ${declineBtn}
          </div>
        </div>
      `;
    } else {
      seenProposalId = null;
      proposalZone.innerHTML = '';
    }

    if (wait_suggestion) {
      banner.textContent = `⏳ Attends ~${wait_suggestion.minutes_restantes} min - une commande proche sera bientôt prête`;
      banner.style.display = 'block';
    } else {
      banner.style.display = 'none';
    }

    const newStopIds = [];
    if (!firstLoad && stops) {
      stops.forEach(s => {
        if (!seenStopIds.has(s.id)) newStopIds.push(s.id);
      });
    }
    (stops || []).forEach(s => seenStopIds.add(s.id));
    firstLoad = false;

    if (!stops || stops.length === 0) {
      container.innerHTML = `<div class="empty">${escapeHtml(message || 'Aucune livraison prête pour le moment')}</div>`;
      return;
    }

    container.innerHTML = stops.map((s, i) => `
      <div class="order-card" data-stop-id="${s.id}">
        <div class="stop-number">Arrêt ${i + 1}${s.numero_commande ? ' · ' + escapeHtml(s.numero_commande) : ''}</div>
        <div class="order-adresse">📍 ${escapeHtml(s.adresse || 'Adresse non renseignée')}</div>
        <div class="order-name">${escapeHtml(s.nom || '—')}</div>
        <div class="order-phone"><a href="tel:${encodeURIComponent(s.telephone || '')}">📞 ${escapeHtml(s.telephone || '—')}</a></div>
        <div class="order-detail">${s.classique || 0}× Classique · ${s.thina || 0}× Thina</div>
        ${s.remarques ? `<div class="order-remarques">📝 ${escapeHtml(s.remarques)}</div>` : ''}
        ${s.localisation_inconnue
          ? '<div class="localisation-warning">⚠️ Adresse non localisée — appelez le client pour confirmer le trajet</div>'
          : `<div class="order-trajet">≈ ${s.minutes_trajet} min depuis la cuisine</div>`}
        <label class="livre-check-row">
          <input type="checkbox" onclick="return confirmLivre(event, ${s.id})" />
          <span>Marquer comme livré</span>
        </label>
      </div>
    `).join('');

    if (newStopIds.length > 0) {
      playBeep([660, 880, 1100]);
      newStopIds.forEach(id => {
        const el = container.querySelector(`[data-stop-id="${id}"]`);
        if (el) {
          el.classList.add('new-flash');
          setTimeout(() => el.classList.remove('new-flash'), 2000);
        }
      });
    }
  }

  async function acceptProposal(id) {
    try {
      const res = await fetch(`/api/orders/${id}/accept`, {
        method: 'POST',
        headers: { 'x-livreur-password': password }
      });
      if (!res.ok) {
        const data = await res.json();
        alert(data.error || "Impossible d'accepter cette commande.");
      }
      tryFetchOrders(password);
    } catch (err) {
      alert("Erreur lors de l'acceptation de la commande.");
    }
  }

  async function declineProposal(id) {
    if (!confirm('Décliner cette commande ? Elle sera proposée à un autre livreur.')) return;
    try {
      const res = await fetch(`/api/orders/${id}/decline`, {
        method: 'POST',
        headers: { 'x-livreur-password': password }
      });
      if (!res.ok) {
        const data = await res.json();
        alert(data.error || 'Impossible de décliner cette commande.');
      }
      tryFetchOrders(password);
    } catch (err) {
      alert('Erreur lors du déclin de la commande.');
    }
  }

  async function logout() {
    try {
      await fetch('/api/livreur/logout', {
        method: 'POST',
        headers: { 'x-livreur-password': password }
      });
    } catch (err) {
      // on se déconnecte localement même si l'appel échoue
    }
    if (refreshTimer) clearInterval(refreshTimer);
    if (geoWatchId !== null) navigator.geolocation.clearWatch(geoWatchId);
    localStorage.removeItem('livreurPassword');
    password = '';
    seenStopIds = new Set();
    seenProposalId = null;
    firstLoad = true;
    document.getElementById('dashboard').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('login-input').value = '';
  }

  function confirmLivre(event, id) {
    if (!confirm('Confirmer que cette commande a bien été livrée ?')) {
      event.preventDefault();
      return false;
    }
    marquerLivre(id);
    return true;
  }

  async function marquerLivre(id) {
    try {
      await fetch(`/api/orders/${id}/status`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-livreur-password': password },
        body: JSON.stringify({ statut: 'livre' })
      });
      tryFetchOrders(password);
    } catch (err) {
      alert('Erreur lors de la mise à jour.');
    }
  }

  function escapeHtml(str) {
    return String(str).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
  }

  document.getElementById('login-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') login();
  });

  if (password) {
    tryFetchOrders(password).then(ok => {
      if (ok) showDashboard();
    });
  }
</script>
</body>
</html>

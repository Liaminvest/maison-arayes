<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Commande confirmée — La Maison de l'Arayes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Permanent+Marker&family=Work+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0D0D0D;
    --bg2: #161616;
    --bg3: #1E1E1E;
    --white: #F2EFE6;
    --cream: #EDEAE2;
    --muted: #8A8A85;
    --accent: #E8572B;
    --accent-h: #F26B3F;
    --fn-head: 'Oswald', sans-serif;
    --fn-body: 'Work Sans', sans-serif;
  }
  body {
    margin: 0;
    min-height: 100vh;
    background: var(--bg);
    color: var(--cream);
    font-family: var(--fn-body);
    font-weight: 600;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 24px;
    box-sizing: border-box;
    position: relative;
  }
  h1 { font-family: var(--fn-head); text-transform: uppercase; }

  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0;
    opacity: 0.1; pointer-events: none;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  }
  body::after {
    content: '';
    position: fixed; inset: 0; z-index: 0;
    opacity: 0.04; pointer-events: none;
    background-image: repeating-linear-gradient(115deg, transparent, transparent 3px, rgba(255,255,255,0.7) 3px, rgba(255,255,255,0.7) 4px);
  }
  .card {
    max-width: 480px;
    position: relative; z-index: 1;
  }
  .icon {
    font-size: 64px;
    margin-bottom: 16px;
  }
  h1 {
    font-size: 30px;
    margin: 0 0 16px;
  }
  p {
    font-size: 16px;
    line-height: 1.6;
    color: var(--muted);
    margin: 0 0 28px;
  }
  a.btn {
    display: inline-block;
    background: var(--white);
    color: #000;
    text-decoration: none;
    font-family: var(--fn-head);
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    padding: 14px 28px;
    transform: skewX(-6deg);
  }
  a.btn:hover { background: var(--accent-h); color: var(--white); }
  .notify-block {
    margin-bottom: 24px;
  }
  button.btn-notify {
    display: inline-block;
    background: var(--accent);
    color: var(--white);
    border: none;
    text-decoration: none;
    font-family: var(--fn-head);
    font-weight: 700;
    font-size: 15px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    padding: 14px 28px;
    cursor: pointer;
    transform: skewX(-6deg);
  }
  button.btn-notify:hover { background: var(--accent-h); }
  .notify-status {
    margin-top: 12px;
    font-size: 14px;
    color: var(--muted);
  }
  .eta-box {
    background: var(--bg3);
    border: 2px solid var(--accent);
    color: var(--accent);
    font-weight: 700;
    font-size: 17px;
    padding: 14px 18px;
    margin: 0 0 24px;
    min-height: 24px;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="icon">✅</div>
    <h1>Commande confirmée !</h1>
    <p>
      Merci pour votre commande !<br/>
      Un message WhatsApp de confirmation vous sera envoyé sous peu.
    </p>

    <div class="eta-box" id="eta-text">Calcul de l'estimation...</div>

    <div class="notify-block">
      <button class="btn-notify" id="notify-btn" onclick="enableNotify()">🔔 Me notifier quand ma commande est prête</button>
      <div class="notify-status" id="notify-status"></div>
    </div>

    <a class="btn" href="/">Retour à l'accueil</a>
  </div>

  <script>
    const sessionId = new URLSearchParams(window.location.search).get('session_id');
    const statusEl = document.getElementById('notify-status');
    const notifyBtn = document.getElementById('notify-btn');
    const etaEl = document.getElementById('eta-text');
    let audioCtx = null;
    let pollTimer = null;
    let notifyEnabled = false;

    function playDing() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      let startTime = audioCtx.currentTime;
      [1000, 1300].forEach(freq => {
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.value = freq;
        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);

        const durSec = 0.35;
        const fade = 0.02;
        gainNode.gain.setValueAtTime(0, startTime);
        gainNode.gain.linearRampToValueAtTime(0.3, startTime + fade);
        gainNode.gain.linearRampToValueAtTime(0.3, startTime + durSec - fade);
        gainNode.gain.linearRampToValueAtTime(0, startTime + durSec);

        osc.start(startTime);
        osc.stop(startTime + durSec);
        startTime += durSec + 0.15;
      });
    }

    function speak(text) {
      if (!('speechSynthesis' in window)) return;
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = 'fr-FR';
      speechSynthesis.speak(utterance);
    }

    async function enableNotify() {
      if (!sessionId) {
        statusEl.textContent = "Impossible d'identifier votre commande pour activer la notification.";
        return;
      }
      if (!('Notification' in window)) {
        statusEl.textContent = "Votre navigateur ne supporte pas les notifications.";
        return;
      }

      const permission = await Notification.requestPermission();
      if (permission !== 'granted') {
        statusEl.textContent = "Notifications refusées. Vous pouvez les autoriser dans les réglages du navigateur.";
        return;
      }

      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      audioCtx.resume();

      notifyEnabled = true;
      notifyBtn.disabled = true;
      notifyBtn.textContent = '🔔 Notification activée — gardez cette page ouverte';
      statusEl.textContent = 'Nous vous notifions dès que votre commande est prête...';
    }

    async function pollOrderStatus() {
      if (!sessionId) {
        etaEl.textContent = '';
        return;
      }
      try {
        const res = await fetch(`/api/order-status?session_id=${encodeURIComponent(sessionId)}`);
        const data = await res.json();
        if (!data.found) {
          etaEl.textContent = "Préparation de votre commande en cours...";
          return;
        }

        const doneStatut = data.mode === 'retrait' ? 'pret' : 'livre';
        if (data.statut === doneStatut) {
          clearInterval(pollTimer);
          const title = data.mode === 'retrait' ? '✅ Votre commande est prête !' : '✅ Votre commande a été livrée !';
          etaEl.textContent = title;
          if (notifyEnabled) {
            playDing();
            setTimeout(() => speak('Votre arayes est arrivé !'), 1100);
            const body = data.mode === 'retrait' ? 'Vous pouvez venir la récupérer.' : 'Bon appétit !';
            new Notification(title, { body });
            statusEl.textContent = title;
          }
        } else if (data.eta_minutes !== null && data.eta_minutes !== undefined && data.eta_set_at) {
          const readyAt = new Date(new Date(data.eta_set_at).getTime() + data.eta_minutes * 60000);
          const timeStr = readyAt.toLocaleTimeString('fr-CH', { hour: '2-digit', minute: '2-digit' });
          etaEl.textContent = `Ton Arayes sera prêt vers ${timeStr}`;
        } else {
          etaEl.textContent = 'Préparation de votre commande en cours...';
        }
      } catch (err) {
        // silently retry on next poll
      }
    }

    if (sessionId) {
      pollOrderStatus();
      pollTimer = setInterval(pollOrderStatus, 10000);
    } else {
      etaEl.textContent = '';
    }
  </script>
</body>
</html>

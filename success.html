<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Commande confirmée — La Maison de l'Arayes</title>
<style>
  body {
    margin: 0;
    min-height: 100vh;
    background: #0C1520;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 24px;
    box-sizing: border-box;
  }
  .card {
    max-width: 480px;
  }
  .icon {
    font-size: 64px;
    margin-bottom: 16px;
  }
  h1 {
    font-size: 28px;
    margin: 0 0 16px;
  }
  p {
    font-size: 16px;
    line-height: 1.6;
    color: #c7d0db;
    margin: 0 0 28px;
  }
  a.btn {
    display: inline-block;
    background: #fff;
    color: #0C1520;
    text-decoration: none;
    font-weight: 600;
    padding: 14px 28px;
    border-radius: 8px;
  }
  .notify-block {
    margin-bottom: 24px;
  }
  button.btn-notify {
    display: inline-block;
    background: #C4923A;
    color: #1a1208;
    border: none;
    text-decoration: none;
    font-weight: 700;
    font-size: 15px;
    padding: 14px 28px;
    border-radius: 8px;
    cursor: pointer;
    font-family: inherit;
  }
  .notify-status {
    margin-top: 12px;
    font-size: 14px;
    color: #8fa0b3;
  }
  .eta-box {
    background: #1a2838;
    border: 1px solid #C4923A;
    color: #C4923A;
    font-weight: 700;
    font-size: 17px;
    padding: 14px 18px;
    border-radius: 10px;
    margin: 0 0 24px;
    min-height: 24px;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="icon">✅</div>
    <h1>Commande confirmée !</h1>
    <p>
      Merci pour votre commande !<br/>
      Un message WhatsApp de confirmation vous sera envoyé sous peu.
    </p>

    <div class="eta-box" id="eta-text">Calcul de l'estimation...</div>

    <div class="notify-block">
      <button class="btn-notify" id="notify-btn" onclick="enableNotify()">🔔 Me notifier quand ma commande est prête</button>
      <div class="notify-status" id="notify-status"></div>
    </div>

    <a class="btn" href="/">Retour à l'accueil</a>
  </div>

  <script>
    const sessionId = new URLSearchParams(window.location.search).get('session_id');
    const statusEl = document.getElementById('notify-status');
    const notifyBtn = document.getElementById('notify-btn');
    const etaEl = document.getElementById('eta-text');
    let audioCtx = null;
    let pollTimer = null;
    let notifyEnabled = false;

    function playDing() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      let startTime = audioCtx.currentTime;
      [1000, 1300].forEach(freq => {
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.value = freq;
        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);

        const durSec = 0.35;
        const fade = 0.02;
        gainNode.gain.setValueAtTime(0, startTime);
        gainNode.gain.linearRampToValueAtTime(0.3, startTime + fade);
        gainNode.gain.linearRampToValueAtTime(0.3, startTime + durSec - fade);
        gainNode.gain.linearRampToValueAtTime(0, startTime + durSec);

        osc.start(startTime);
        osc.stop(startTime + durSec);
        startTime += durSec + 0.15;
      });
    }

    function speak(text) {
      if (!('speechSynthesis' in window)) return;
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = 'fr-FR';
      speechSynthesis.speak(utterance);
    }

    async function enableNotify() {
      if (!sessionId) {
        statusEl.textContent = "Impossible d'identifier votre commande pour activer la notification.";
        return;
      }
      if (!('Notification' in window)) {
        statusEl.textContent = "Votre navigateur ne supporte pas les notifications.";
        return;
      }

      const permission = await Notification.requestPermission();
      if (permission !== 'granted') {
        statusEl.textContent = "Notifications refusées. Vous pouvez les autoriser dans les réglages du navigateur.";
        return;
      }

      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      audioCtx.resume();

      notifyEnabled = true;
      notifyBtn.disabled = true;
      notifyBtn.textContent = '🔔 Notification activée — gardez cette page ouverte';
      statusEl.textContent = 'Nous vous notifions dès que votre commande est prête...';
    }

    async function pollOrderStatus() {
      if (!sessionId) {
        etaEl.textContent = '';
        return;
      }
      try {
        const res = await fetch(`/api/order-status?session_id=${encodeURIComponent(sessionId)}`);
        const data = await res.json();
        if (!data.found) {
          etaEl.textContent = "Préparation de votre commande en cours...";
          return;
        }

        const doneStatut = data.mode === 'retrait' ? 'pret' : 'livre';
        if (data.statut === doneStatut) {
          clearInterval(pollTimer);
          const title = data.mode === 'retrait' ? '✅ Votre commande est prête !' : '✅ Votre commande a été livrée !';
          etaEl.textContent = title;
          if (notifyEnabled) {
            playDing();
            setTimeout(() => speak('Votre arayes est arrivé !'), 1100);
            const body = data.mode === 'retrait' ? 'Vous pouvez venir la récupérer.' : 'Bon appétit !';
            new Notification(title, { body });
            statusEl.textContent = title;
          }
        } else if (data.eta_minutes !== null && data.eta_minutes !== undefined) {
          const label = data.mode === 'retrait' ? 'prête' : 'livrée';
          etaEl.textContent = `⏱ Estimation : ${label} dans environ ${data.eta_minutes} min`;
        } else {
          etaEl.textContent = 'Préparation de votre commande en cours...';
        }
      } catch (err) {
        // silently retry on next poll
      }
    }

    if (sessionId) {
      pollOrderStatus();
      pollTimer = setInterval(pollOrderStatus, 10000);
    } else {
      etaEl.textContent = '';
    }
  </script>
</body>
</html>

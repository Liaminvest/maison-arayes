<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Commande confirmée — La Maison de l'Arayes</title>
<style>
  body {
    margin: 0;
    min-height: 100vh;
    background: #0C1520;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 24px;
    box-sizing: border-box;
  }
  .card {
    max-width: 480px;
  }
  .icon {
    font-size: 64px;
    margin-bottom: 16px;
  }
  h1 {
    font-size: 28px;
    margin: 0 0 16px;
  }
  p {
    font-size: 16px;
    line-height: 1.6;
    color: #c7d0db;
    margin: 0 0 28px;
  }
  a.btn {
    display: inline-block;
    background: #fff;
    color: #0C1520;
    text-decoration: none;
    font-weight: 600;
    padding: 14px 28px;
    border-radius: 8px;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="icon">✅</div>
    <h1>Commande confirmée !</h1>
    <p>
      Merci pour votre commande. La livraison se fera entre 19h et 22h.<br/>
      Un message WhatsApp de confirmation vous sera envoyé sous peu.
    </p>
    <a class="btn" href="/">Retour à l'accueil</a>
  </div>
</body>
</html>
